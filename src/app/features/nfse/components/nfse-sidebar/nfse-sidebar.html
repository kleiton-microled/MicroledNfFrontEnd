<aside class="sidebar-container d-flex flex-column h-100" [class.sidebar-collapsed]="collapsed()">

  <div class="sidebar-brand">
    <span class="brand-logo">
      <i class="bi bi-receipt"></i>
    </span>
    <div class="sidebar-brand-text">
      <span class="sidebar-brand-title">Microled</span>
      <span class="sidebar-brand-subtitle">Nota Fiscal</span>
    </div>
    <button
      type="button"
      class="sidebar-toggle"
      (click)="toggleCollapse()"
      [attr.aria-label]="collapsed() ? 'Expandir menu' : 'Recolher menu'"
      [attr.aria-expanded]="!collapsed()"
    >
      <i class="bi" [class.bi-chevron-left]="!collapsed()" [class.bi-chevron-right]="collapsed()"></i>
    </button>
  </div>

  <nav class="sidebar-nav flex-grow-1">
    <ul class="nav flex-column gap-1">
      @for (item of navigationItems; track item.route) {
        <li class="nav-item">
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
            class="nav-link"
            [title]="item.label"
          >
            <i class="bi" [class]="item.icon"></i>
            <span class="nav-link-label">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

</aside>
